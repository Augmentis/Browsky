<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browsky</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <span class="header-logo">Browsky</span>
    <div class="header-actions">
      <button class="icon-btn" id="toggle-view" title="Switch to popup">⬡</button>
    </div>
  </header>

  <!-- Session tabs -->
  <div class="session-tabs" id="session-tabs">
    <button class="new-session-btn" id="new-session-btn" title="New session">+</button>
  </div>

  <!-- Connecting state -->
  <div class="connecting" id="connecting">
    <div class="spinner"></div>
    Starting server…
  </div>

  <!-- Main content (messages + input) — hidden until connected -->
  <div id="main-content" style="display:none; flex:1; display:flex; flex-direction:column; overflow:hidden;">

    <!-- No session selected -->
    <div class="no-session" id="no-session">
      <div class="no-session-icon">💬</div>
      <div class="no-session-title">No session open</div>
      <div class="no-session-sub">Click <strong>+</strong> above to start a new conversation with Claude or a local model.</div>
    </div>

    <!-- Active chat view (hidden when no session) -->
    <div id="chat-view" hidden style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
      <div class="messages" id="messages"></div>

      <div class="input-area">
        <div class="input-wrap">
          <textarea id="chat-input" rows="1" placeholder="Message…"></textarea>
        </div>
        <button class="send-btn" id="send-btn" disabled title="Send (Enter)">↑</button>
      </div>
    </div>

  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>

</div>

<!-- New session modal -->
<div class="modal-overlay" id="modal" hidden>
  <div class="modal">
    <div>
      <div class="modal-title">New Session</div>
      <div class="modal-sub">Choose a model to start chatting</div>
    </div>

    <div class="model-choices">
      <button class="model-choice-btn" id="choose-claude" data-type="claude">
        <span class="model-choice-icon">✦</span>
        <span class="model-choice-label">Claude</span>
      </button>
      <button class="model-choice-btn" id="choose-ollama" data-type="ollama">
        <span class="model-choice-icon">⬡</span>
        <span class="model-choice-label">Local Model</span>
      </button>
    </div>

    <div class="ollama-picker" id="ollama-picker" hidden>
      <span class="picker-label">Select model</span>
      <select id="model-select">
        <option value="">Loading models…</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="modal-start" disabled>Start</button>
    </div>
  </div>
</div>

<script src="sidebar.js"></script>
</body>
</html>
